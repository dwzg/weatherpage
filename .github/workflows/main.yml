name: Relay Weather Data to App

on:
  workflow_dispatch:
    inputs:
      temperature:
        required: true
        type: string
      humidity:
        required: true
        type: string
      pressure:
        required: true
        type: string
      timestamp:
        required: true
        type: string

jobs:
  relay:
    runs-on: ubuntu-latest

    steps:
      - name: Forward weather data to app
        run: |
          curl -s -X POST "${{ secrets.APP_URL }}/api/weather" \
            -H "Content-Type: application/json" \
            -d '{
              "temperature": "${{ inputs.temperature }}",
              "humidity": "${{ inputs.humidity }}",
              "pressure": "${{ inputs.pressure }}",
              "timestamp": "${{ inputs.timestamp }}"
            }' \
            -w "\nHTTP %{http_code}" \
            --fail-with-body
